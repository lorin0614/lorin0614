<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 작품 저장소</title>
    <style>
        /* 깔끔한 디자인을 위한 CSS */
        body { font-family: 'Apple SD Gothic Neo', sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #f9f9f9; }
        header { text-align: center; padding: 50px 0; background: #fff; border-bottom: 1px solid #ddd; }
        .container { max-width: 800px; margin: 20px auto; display: grid; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h2 { margin-top: 0; color: #333; }
        .tag { display: inline-block; background: #e1f5fe; color: #01579b; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>

<header>
    <h1>My Creative Work</h1>
    <p>공부한 내용과 프로젝트를 기록하는 공간입니다.</p>
</header>

<div class="container">
    <div class="card">
        <span class="tag">SwiftUI</span>
        <h2>카운터 애플리케이션</h2>
        <p>SwiftUI와 Swift Playgrounds를 활용해 만든 첫 번째 iOS 앱 프로젝트입니다.</p>
    </div>

    <div class="card">
        <span class="tag">Literature</span>
        <h2>고전 문학 분석 노트</h2>
        <p>한국 고전 시가와 소설 속의 사회 비판적 시각을 정리한 기록입니다.</p>
    </div>
</div>

</body>
</html>
